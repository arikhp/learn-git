<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    footer { margin-top: 40px; padding: 20px; text-align: center; }
    footer a { margin: 0 12px; color: #333; font-size: 28px; text-decoration: none; }
    footer a:hover { color: #0073e6; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #fff; border-radius: 12px; padding: 40px 32px;
      width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); text-align: center;
    }
    .modal h2 { margin: 0 0 24px; font-size: 24px; color: #222; }
    .modal input {
      width: 100%; padding: 10px 14px; margin-bottom: 14px;
      border: 1px solid #ddd; border-radius: 8px; font-size: 15px; box-sizing: border-box;
    }
    .modal input:focus { outline: none; border-color: #0073e6; }
    .modal .btn-login {
      width: 100%; padding: 11px; background: #0073e6; color: #fff;
      border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
    }
    .modal .btn-login:hover { background: #005bbf; }
    .modal .close {
      position: absolute; top: 12px; right: 16px;
      font-size: 22px; cursor: pointer; color: #888; background: none; border: none;
    }
    .modal-wrap { position: relative; }
  </style>
</head>
<body>
  <h1>Hello World</h1>
  <p>hello v2</p>
  <button style="background-color: green; color: white; padding: 10px 20px; border: none; cursor: pointer;">Explode</button>
  <button onclick="document.getElementById('loginModal').classList.add('active')" style="padding: 10px 20px; margin-left: 10px; cursor: pointer;">Login</button>

  <div class="modal-overlay" id="loginModal">
    <div class="modal-wrap">
      <div class="modal">
        <button class="close" onclick="document.getElementById('loginModal').classList.remove('active')">&times;</button>
        <h2>Login</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn-login">Sign In</button>
      </div>
    </div>
  </div>
  <footer>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-github"></i></a>
    <a href="#"><i class="fab fa-linkedin"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
  </footer>
</body>
</html>
